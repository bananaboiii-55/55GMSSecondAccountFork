    <script>
        var elem = document.getElementById("iframe");

        function fullscreen() {
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            } else if (elem.mozRequestFullScreen) {
                elem.mozRequestFullScreen();
            } else {
                location.href = elem.src;
            }
        }
        function reload() {
            document.getElementById("iframe").src += "";
        }
        reloadbtn.onclick = reload;

        const cheatPanel = document.createElement("div");
        cheatPanel.id = "cheatPanel";
        cheatPanel.className = "cheat-panel hidden";
        cheatPanel.innerHTML = `
            <div class="cheat-panel-header">
                <span>Retro Bowl Cheat Terminal</span>
                <button id="cheatClose" class="small-btn">×</button>
            </div>
            <div class="cheat-panel-body">
                <p class="cheat-hint">Run JavaScript commands in the game iframe. Try <code>localStorage.getItem('save')</code> or <code>storage.list</code>.</p>
                <input id="cheatInput" type="text" placeholder="Enter JS command, e.g. document.querySelector('canvas')" />
                <div class="cheat-actions">
                    <button id="cheatRun" class="small-btn">Run</button>
                    <button id="cheatClear" class="small-btn">Clear</button>
                </div>
                <pre id="cheatOutput">Ready.</pre>
            </div>
        `;
        document.body.appendChild(cheatPanel);

        const cheatToggle = document.getElementById("cheatToggle");
        const cheatClose = document.getElementById("cheatClose");
        const cheatRun = document.getElementById("cheatRun");
        const cheatClear = document.getElementById("cheatClear");
        const cheatOutput = document.getElementById("cheatOutput");
        const cheatInput = document.getElementById("cheatInput");

        function showCheatPanel(show) {
            cheatPanel.classList.toggle("hidden", !show);
            if (show) {
                cheatInput.focus();
            }
        }

        function formatResult(value) {
            if (value === undefined) return "undefined";
            if (value === null) return "null";
            if (typeof value === "object") {
                try {
                    return JSON.stringify(value, null, 2);
                } catch (e) {
                    return String(value);
                }
            }
            return String(value);
        }

        function runCheatCommand() {
            const command = cheatInput.value.trim();
            if (!command) {
                cheatOutput.textContent = "Enter a JavaScript command first.";
                return;
            }
            const iframe = document.getElementById("iframe");
            if (!iframe || !iframe.contentWindow) {
                cheatOutput.textContent = "Game iframe is not loaded yet.";
                return;
            }

            try {
                const win = iframe.contentWindow;
                let result;

                if (command === "help") {
                    cheatOutput.textContent = "Use JS commands or storage.list, storage.get <key>, storage.set <key> <value>, storage.remove <key>.";
                    return;
                }

                if (command === "storage.list") {
                    result = Object.keys(win.localStorage);
                } else if (command.startsWith("storage.get ")) {
                    const key = command.slice(12).trim();
                    result = win.localStorage.getItem(key);
                } else if (command.startsWith("storage.set ")) {
                    const rest = command.slice(12).trim();
                    const spaceIndex = rest.indexOf(" ");
                    if (spaceIndex < 0) {
                        throw new Error("Usage: storage.set <key> <value>");
                    }
                    const key = rest.slice(0, spaceIndex);
                    let value = rest.slice(spaceIndex + 1);
                    try {
                        value = JSON.parse(value);
                    } catch (e) {
                        // keep as string
                    }
                    if (typeof value === "object") {
                        value = JSON.stringify(value);
                    }
                    win.localStorage.setItem(key, value);
                    result = `Saved ${key}`;
                } else if (command.startsWith("storage.remove ")) {
                    const key = command.slice(15).trim();
                    win.localStorage.removeItem(key);
                    result = `Removed ${key}`;
                } else {
                    result = win.eval(command);
                }
                cheatOutput.textContent = formatResult(result);
            } catch (error) {
                cheatOutput.textContent = `Error: ${error.message || error}`;
            }
        }

        cheatToggle.addEventListener("click", () => showCheatPanel(true));
        cheatClose.addEventListener("click", () => showCheatPanel(false));
        cheatRun.addEventListener("click", runCheatCommand);
        cheatClear.addEventListener("click", () => {
            cheatOutput.textContent = "Ready.";
            cheatInput.value = "";
        });
        cheatInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                runCheatCommand();
            }
        });
        document.addEventListener("keydown", (event) => {
            if (event.ctrlKey && event.key === "`") {
                event.preventDefault();
                showCheatPanel(!cheatPanel.classList.contains("hidden"));
            }
        });
    </script>
