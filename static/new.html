<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunaar Search</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico" />
    <script src="/assets/js/font.js"></script>
    <script>
      (function() {
        const mode = localStorage.getItem('themeMode') || 'original';
        const customColor = localStorage.getItem('customColor');
        if (mode === 'meatworm') {
          document.documentElement.classList.add('meatworm');
          const st = document.createElement('style');
          st.innerHTML = 'body{background-color:#fff!important;color:#000!important}.navbar{background:#fff!important}.navbar a{color:#000!important}a{color:#0033cc!important}';
          document.head.appendChild(st);
          document.addEventListener('DOMContentLoaded', function() {
            const nav = document.getElementById('nav-title');
            if (nav) nav.textContent = 'Evil Meatworm Games';
            if (!localStorage.getItem('tab')) {
              document.title = 'Evil Meatworm Games';
            }
          });
        } else if (mode === 'custom' && customColor) {
          const c = customColor.replace('#', '');
          const r = parseInt(c.substr(0, 2), 16);
          const g = parseInt(c.substr(2, 2), 16);
          const b = parseInt(c.substr(4, 2), 16);
          const brightness = (r * 299 + g * 587 + b * 114) / 1000;
          const st = document.createElement('style');
          const txt = brightness > 128 ? '#000' : '#fff';
          const lnk = brightness > 128 ? '#0033cc' : '#f1a727';
          st.innerHTML = 'body{background-color:' + customColor + '!important;color:' + txt + '!important}a{color:' + lnk + '!important}';
          document.head.appendChild(st);
        } else if (mode === 'galaxy') {
          // Galaxy theme will be loaded via galaxy.js
        }
      })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .search-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            padding: 0 20px;
        }


        .search-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 40px;
            background: #666;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .search {
            font-size: 40px;
            color: white;
        }

        .main-title {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 36px;
            }

            .subtitle {
                font-size: 16px;
            }
        }
    </style>
    <script src="/assets/js/galaxy.js" defer></script>
</head>

<body>
    <div class="search-container">
        <div class="search-icon"><i class="fa-solid fa-magnifying-glass search"></i></div>
        <h1 class="main-title">Welcome to 55GMS!</h1>
        <p class="subtitle">search through the search bar</p>
    </div>
</body>

</html>
